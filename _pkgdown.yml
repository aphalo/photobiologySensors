destination: ../docs/photobiologySensors
url: https://docs.r4photobiology.info/photobiologySensors/

template:
  bootstrap: 5

reference:
  - title: Package overview
    desc: Simple use examples and description.
    contents:
    - "photobiologySensors-package"
  - title: Spectral response data
    desc: Data on the spectral response of light and image sensors.
    contents:
    - sensors.mspct
    - image_sensors.mspct
  - title: Indexing vectors by type
    desc: Indexing vectors useful to extract members of `sensors.mspct`.
    contents:
    - uv_sensors
    - ideal_sensors
    - electronic_components
  - title: Indexing vectors by make
    desc: Indexing vectors useful to extract members of `sensors.mspct`.
    contents:
    - ams_sensors
    - analytik_sensors
    - apogee_sensors
    - berger_sensors
    - deltat_sensors
    - irradian_sensors
    - kipp_sensors
    - licor_sensors
    - sglux_sensors
    - skye_sensors
    - solarlight_sensors
    - solarmeter_sensors
    - specmeters_sensors
    - thiesclima_sensors
    - vishay_sensors
    - vitaltech_sensors
  - title: Angular response data
    desc: Data on the angular response of sensors and of entrance optics for spectrometers.
    contents:
    - diffusers.lst
  - title: Indexing vectors by type of entrance optics
    desc: Indexing vectors useful to extract members of `diffusers.lst`.
    contents:
    - all_diffusers

